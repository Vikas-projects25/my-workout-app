<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Athlete">
<meta name="theme-color" content="#0d0d0d">
<title>Athlete — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;--border:#2a2a2a;--border2:#333;--text:#f0ede6;--text2:#999;--text3:#555;--accent:#c8390e;--gold:#c9a84c;--green:#2ecc71;--blue:#3a9fd4;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.app-header{background:var(--bg);padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.app-logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--accent);flex-shrink:0}
.app-logo span{color:var(--text)}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.hbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:5px 9px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:.5px;white-space:nowrap}
.hbtn:active{opacity:.7}
.unit-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.unit-toggle button{background:var(--bg3);border:none;color:var(--text3);padding:5px 10px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px}
.unit-toggle button.active{background:var(--accent);color:#fff}
.bottom-nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-bot)}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}
.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* TODAY */
.today-hero{background:linear-gradient(135deg,var(--bg2) 0%,#1a1008 100%);padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.today-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.today-day{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;text-transform:uppercase;line-height:1;color:var(--text)}
.today-focus{font-size:13px;color:var(--text2);margin-top:4px}
.today-meta{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.today-chip{background:var(--bg3);border:1px solid var(--border2);padding:4px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2)}
.today-chip strong{color:var(--accent);font-weight:500}
.prog-wrap{padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.prog-label{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.sh{padding:14px 20px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:10px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}

/* EXERCISE CARD */
.ex-card{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.ex-card.done{border-color:var(--green)}
.ex-card-hd{display:flex;align-items:center;padding:12px 14px;gap:10px}
.ex-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ex-check.checked{background:var(--green);border-color:var(--green)}
.ex-check svg{width:14px;height:14px;display:none}
.ex-check.checked svg{display:block}
.ex-info{flex:1;min-width:0}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;line-height:1.1;color:var(--text)}
.ex-rx{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-top:2px}
.ex-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.ex-tag{font-size:9px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:3px;background:var(--bg4);color:var(--text3)}
.ex-xbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.ex-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.ex-body.open{display:block}
.sets-hd{display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:6px;padding:8px 0 4px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;text-align:center}
.sets-hd div:first-child{text-align:left}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-n{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}
.si{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;text-align:center;padding:7px 4px;width:100%;-webkit-appearance:none}
.si:focus{outline:none;border-color:var(--accent)}
.si::placeholder{color:var(--text3)}
.set-done-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;color:var(--text3);padding:7px 4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.set-done-btn.done{background:rgba(46,204,113,.15);border-color:var(--green);color:var(--green)}
.prev-w{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:center;padding:3px 0 0}
.prev-w span{color:var(--gold)}
.add-set{width:100%;background:var(--bg3);border:1px dashed var(--border2);color:var(--text3);padding:7px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:7px}
.note-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:5px 0 0;text-decoration:underline;font-style:italic;font-family:'DM Sans',sans-serif}
.note-txt{display:none;font-size:12px;color:var(--text3);font-style:italic;line-height:1.5;margin-top:5px;padding:9px 11px;background:var(--bg3);border-radius:6px;border-left:2px solid var(--accent)}
.note-txt.open{display:block}

/* CARDIO CARD */
.cardio-card{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:14px}
.cc-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;color:var(--text);margin-bottom:3px}
.cc-detail{font-size:12px;color:var(--text2);line-height:1.5;font-style:italic}
.cc-cal{margin-top:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold)}

/* GYM-SKIP PANEL */
.skip-panel{margin:12px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.skip-header{padding:12px 14px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.skip-header-left{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;color:var(--text2)}
.skip-header-left span{font-size:11px;font-family:'DM Mono',monospace;font-weight:400;letter-spacing:1px;color:var(--text3);margin-left:8px;text-transform:none}
.skip-toggle{font-size:18px;color:var(--text3)}
.skip-body{display:none;padding:12px 14px}
.skip-body.open{display:block}
.skip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.skip-ex-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .2s}
.skip-ex-btn.sel{border-color:var(--accent);background:rgba(200,57,14,.12)}
.skip-ex-icon{font-size:22px;margin-bottom:3px}
.skip-ex-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text);letter-spacing:.5px}
.skip-inputs{display:none}
.skip-inputs.open{display:block}
.skip-input-group{margin-bottom:10px}
.skip-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.skip-row{display:flex;gap:8px;align-items:center}
.skip-in{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:10px 12px;-webkit-appearance:none}
.skip-in:focus{outline:none;border-color:var(--accent)}
.skip-unit-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;padding:10px 8px;-webkit-appearance:none;cursor:pointer}
.skip-cal-preview{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.skip-cal-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.skip-cal-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--gold)}
.skip-log-btn{width:100%;background:var(--blue);border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:13px;cursor:pointer}
.skip-log-btn:active{opacity:.85}
.skip-logged-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.skip-logged-item{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.sli-left .sli-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;color:var(--text)}
.sli-left .sli-detail{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.sli-right{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold)}
.sli-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 0 0 8px}

/* FINISH BTN */
.finish-btn{margin:14px;width:calc(100% - 28px);background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:15px;cursor:pointer;transition:opacity .15s}
.finish-btn:active{opacity:.85}
.finish-btn:disabled{background:var(--bg4);color:var(--text3);cursor:default}

/* HISTORY */
.hist-filters{padding:10px 14px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.hist-filters::-webkit-scrollbar{display:none}
.filt-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.filt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.hist-list{padding:10px 14px}
.hist-entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.he-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.he-day{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;margin-top:2px}
.he-stats{display:flex;gap:14px;margin-top:7px;flex-wrap:wrap}
.he-stat{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.he-stat span{color:var(--gold)}
.he-exs{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.he-ex{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)}
.he-ex:last-child{border-bottom:none}
.he-ex-name{font-weight:500;color:var(--text);font-size:13px}
.he-ex-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold)}
.he-skip-exs{margin-top:8px;background:rgba(58,159,212,.08);border:1px solid rgba(58,159,212,.2);border-radius:6px;padding:8px 10px}
.he-skip-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:5px}

/* PROGRESS */
.prog-page{padding:14px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.chart-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;color:var(--text);margin-bottom:2px}
.chart-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.chart-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;margin-bottom:12px;width:100%;-webkit-appearance:none}
canvas{width:100%!important;height:170px!important}
.bw-entry{display:flex;gap:8px;margin-bottom:12px}
.bw-in{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:9px 11px;-webkit-appearance:none}
.bw-in:focus{outline:none;border-color:var(--accent)}
.log-bw-btn{background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;padding:9px 16px;cursor:pointer}
.pb-list{margin-top:8px}
.pb-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.pb-row:last-child{border-bottom:none}
.pb-name{font-size:13px;color:var(--text);font-weight:500}
.pb-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold)}
.pb-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;font-style:italic}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:18px 18px calc(18px + var(--safe-bot));width:100%;border-top:1px solid var(--border);max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;color:var(--text);margin-bottom:14px}
.modal-in{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:20px;padding:13px 14px;text-align:center;-webkit-appearance:none;margin-bottom:10px}
.modal-in:focus{outline:none;border-color:var(--accent)}
.modal-btn{width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:13px;cursor:pointer;display:block;margin-top:6px}
.modal-btn:active{opacity:.85}
.modal-hint{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px;font-style:italic}

/* SESSION COMPLETE */
.sess-complete{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:2000;flex-direction:column;align-items:center;justify-content:center;padding:36px 22px}
.sess-complete.open{display:flex}
.sc-icon{font-size:72px;margin-bottom:14px}
.sc-title{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;text-transform:uppercase;color:var(--green);text-align:center;line-height:1}
.sc-sub{font-size:14px;color:var(--text2);text-align:center;margin-top:8px;line-height:1.6}
.sc-stats{display:flex;gap:18px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.sc-stat .v{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;color:var(--text);line-height:1}
.sc-stat .l{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.sc-close{background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:13px 36px;cursor:pointer;margin-top:8px}

.install-hint{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.ih-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}

/* PLAN PAGE */
.plan-day-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2);scrollbar-width:none;flex-shrink:0}
.plan-day-tabs::-webkit-scrollbar{display:none}
.plan-tab{flex-shrink:0;padding:10px 14px;background:none;border:none;border-bottom:3px solid transparent;color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.plan-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.plan-tab .pt-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.plan-page{padding:0 0 40px}
.plan-hero{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.plan-day-name{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;text-transform:uppercase;line-height:1}
.plan-focus{font-size:13px;color:var(--text2);margin-top:4px}
.plan-chips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.plan-chip{background:var(--bg3);border:1px solid var(--border2);padding:4px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2)}
.plan-chip strong{color:var(--accent);font-weight:500}
.plan-ex-list{padding:0 14px}
.plan-ex{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden}
.plan-ex-main{padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.plan-ex-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--border2);line-height:1;flex-shrink:0;width:28px;text-align:right}
.plan-ex-content{flex:1}
.plan-ex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;color:var(--text);line-height:1.1}
.plan-ex-sets{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);margin-top:4px;letter-spacing:.5px}
.plan-ex-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.plan-ex-tag{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text3)}
.plan-ex-note{font-size:12px;color:var(--text3);font-style:italic;line-height:1.5;padding:10px 14px 14px 56px;border-top:1px solid var(--border);display:none}
.plan-ex-note.open{display:block}
.plan-ex-note-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;text-decoration:underline;font-style:italic;margin-top:6px;display:block;font-family:'DM Sans',sans-serif}
.plan-sets-breakdown{padding:10px 14px 14px 56px;border-top:1px solid var(--border)}
.plan-set-row{display:grid;grid-template-columns:60px 1fr 80px;gap:8px;padding:5px 0;border-bottom:1px solid #1a1a1a;font-family:'DM Mono',monospace;font-size:11px;align-items:center}
.plan-set-row:last-child{border-bottom:none}
.plan-set-num{color:var(--text3)}
.plan-set-target{color:var(--text2)}
.plan-set-prev{color:var(--gold);text-align:right;font-size:10px}
.plan-rest-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin:10px 14px;padding:20px;text-align:center}
.plan-rest-icon{font-size:56px;margin-bottom:10px}
.plan-rest-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;text-transform:uppercase;color:var(--text3)}
.plan-rest-sub{font-size:13px;color:var(--text3);margin-top:6px;font-style:italic;line-height:1.5}
.plan-cardio-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;margin:10px 14px;padding:14px}
.plan-cardio-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;color:var(--text);margin-bottom:4px}
.plan-cardio-detail{font-size:12px;color:var(--text2);line-height:1.5;font-style:italic}
.today-badge{background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-logo">Ath<span>lete</span></div>
    <div class="header-right">
      <div class="unit-toggle">
        <button id="unit-kg" class="active" onclick="setUnit('kg')">KG</button>
        <button id="unit-lb" onclick="setUnit('lb')">LB</button>
      </div>
      <button class="hbtn" onclick="openWeightModal()">⚖ Weight</button>
      <button class="hbtn" style="border-color:#c9a84c;color:#c9a84c" onclick="openBackupModal()">☁ Backup</button>
    </div>
  </div>

  <div id="page-today" class="page active"></div>
  <div id="page-plan" class="page"></div>
  <div id="page-history" class="page"></div>
  <div id="page-progress" class="page"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showPage('today',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Today</span>
    </button>
    <button class="nav-btn" onclick="showPage('plan',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Plan</span>
    </button>
    <button class="nav-btn" onclick="showPage('history',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>History</span>
    </button>
    <button class="nav-btn" onclick="showPage('progress',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progress</span>
    </button>
  </nav>
</div>

<!-- WEIGHT MODAL -->
<div class="modal-overlay" id="wt-modal" onclick="if(event.target.id==='wt-modal')this.classList.remove('open')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Log Body Weight</div>
    <div class="modal-hint" id="wt-hint">Enter weight in kg</div>
    <input class="modal-in" type="number" id="wt-in" placeholder="85.0" step="0.1" inputmode="decimal">
    <button class="modal-btn" onclick="saveBodyWt()">Save</button>
  </div>
</div>

<!-- SESSION COMPLETE -->
<div class="sess-complete" id="sess-complete">
  <div class="sc-icon">🔥</div>
  <div class="sc-title">Session<br>Complete</div>
  <div class="sc-sub" id="sc-sub"></div>
  <div class="sc-stats" id="sc-stats"></div>
  <button class="sc-close" onclick="closeSessComplete()">Done</button>
</div>

<!-- BACKUP MODAL -->
<div class="modal-overlay" id="bk-modal" onclick="if(event.target.id==='bk-modal')this.classList.remove('open')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Backup &amp; Restore</div>
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:14px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:5px">Your Data</div>
      <div id="bk-summary" style="font-size:13px;color:var(--text2);line-height:1.6"></div>
    </div>
    <button class="modal-btn" onclick="exportData()" style="background:var(--gold);margin-bottom:8px">&#8595; Download Backup</button>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px;font-style:italic">Save to iCloud Drive or email to yourself</div>
    <div style="background:var(--bg3);border:2px dashed var(--border2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;margin-bottom:8px" onclick="document.getElementById('imp-file').click()">
      <div style="font-size:26px;margin-bottom:5px">&#128194;</div>
      <div style="font-size:13px;color:var(--text2)">Tap to restore from backup file</div>
    </div>
    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
    <div id="imp-status" style="font-size:12px;text-align:center;display:none;margin-bottom:8px"></div>
    <button class="modal-btn" onclick="document.getElementById('bk-modal').classList.remove('open')" style="background:var(--bg4);color:var(--text2)">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ═══════════════════════════════════════
// PROGRAM DATA
// ═══════════════════════════════════════
const PROGRAM = {
  0:{name:'Sunday',focus:'Pull — Back, Biceps',color:'#7a3010',duration:60,type:'lifting',exercises:[
    {id:'deadlift',name:'Conventional Deadlift',sets:4,reps:'4–5',tags:['back','hamstrings','glutes'],note:'Bar over mid-foot. Drive the floor away. Heaviest lift of the week.'},
    {id:'pullups',name:'Weighted Pull-Ups',sets:4,reps:'6–8',tags:['lats','biceps'],note:'Full dead hang. Add weight when you can do 3×8 bodyweight cleanly.'},
    {id:'bbrow',name:'Barbell Bent-Over Row',sets:4,reps:'6–8',tags:['mid back','rhomboids'],note:'Hip hinge, back parallel, pull to lower ribcage. Initiate with elbows.'},
    {id:'facepull_curl',name:'Face Pulls + EZ Curl (superset)',sets:3,reps:'15+12',tags:['rear delt','biceps'],note:'Face pulls: rope to forehead, elbows high. Then EZ curls, 3-sec negative.'},
    {id:'hammer_sun',name:'Hammer Curl',sets:3,reps:'10–12',tags:['brachialis'],note:'Neutral grip. Builds brachialis — pushes bicep up. Strict form.'}
  ]},
  1:{name:'Monday',focus:'Push — Chest, Shoulders, Triceps',color:'#1a4a6b',duration:55,type:'lifting',exercises:[
    {id:'bench',name:'Barbell Bench Press',sets:4,reps:'5–7',tags:['chest','triceps','front delt'],note:'Flat bench, grip wider than shoulders. Lower to lower chest. Track weight weekly.'},
    {id:'ohp',name:'Overhead Barbell Press',sets:4,reps:'5–7',tags:['shoulders','triceps'],note:'Standing, core braced. Bar from collarbone to full overhead lockout.'},
    {id:'incline_db',name:'Incline Dumbbell Press',sets:3,reps:'8–10',tags:['upper chest','front delt'],note:'30–45° bench. Elbows at 75°. 3-second descent.'},
    {id:'lat_skull',name:'Lateral Raises + Skull Crushers (superset)',sets:3,reps:'12+10',tags:['medial delt','triceps'],note:'Raises to shoulder height, then immediately skull crushers. 90 sec rest.'},
    {id:'pushdown',name:'Cable Tricep Pushdown (rope)',sets:3,reps:'12–15',tags:['triceps'],note:'Elbows pinned. Spread rope at bottom for full contraction.'}
  ]},
  2:{name:'Tuesday',focus:'Legs — Quads, Hamstrings, Glutes, Calves',color:'#2d6b3a',duration:65,type:'lifting',exercises:[
    {id:'squat',name:'Barbell Back Squat',sets:5,reps:'5',tags:['quads','glutes','hamstrings'],note:'High bar, shoulder-width, toes 20–30° out. At minimum parallel depth. King lift.'},
    {id:'rdl',name:'Romanian Deadlift (RDL)',sets:4,reps:'8–10',tags:['hamstrings','glutes'],note:'Hinge at hips, bar against legs, push hips back for deep hamstring stretch.'},
    {id:'lunges',name:'Walking Dumbbell Lunges',sets:3,reps:'12 each',tags:['quads','glutes'],note:'Long stride, rear knee to floor. Mirrors tennis split-step.'},
    {id:'hipthrust',name:'Barbell Hip Thrust',sets:3,reps:'10–12',tags:['glutes','hamstrings'],note:'Bar on hips. Drive up explosively, 1-sec squeeze at top.'},
    {id:'curl_ext',name:'Leg Curl + Leg Extension (superset)',sets:3,reps:'12+12',tags:['hamstrings','quads'],note:'Curl first with 3-sec negative. Then extension with squeeze at top.'},
    {id:'calf',name:'Standing Calf Raise',sets:4,reps:'15–20',tags:['calves'],note:'Full range. 2 sec up, 2 sec down. Pause and squeeze at top.'}
  ]},
  3:{name:'Wednesday',focus:'Arms & Core — Biceps, Triceps, Abs',color:'#6b2d7a',duration:55,type:'lifting',exercises:[
    {id:'ez_curl',name:'EZ Bar Curl',sets:4,reps:'8–10',tags:['biceps'],note:'Elbows pinned. Full ROM. 3-second lowering every rep.'},
    {id:'incline_curl',name:'Incline Dumbbell Curl',sets:3,reps:'10–12',tags:['biceps long head'],note:'Arms hang below before each rep. Best for bicep peak.'},
    {id:'hammer_wed',name:'Hammer Curl',sets:3,reps:'12',tags:['brachialis'],note:'Neutral grip, slow negative. Third bicep session this week.'},
    {id:'dips',name:'Parallel Bar Dips',sets:4,reps:'8–10',tags:['triceps','lower chest'],note:'Stay upright for tricep focus. Full lockout. Add weight when ready.'},
    {id:'oh_ext',name:'Overhead Tricep Extension',sets:3,reps:'10–12',tags:['triceps long head'],note:'Both hands on one dumbbell. Elbows close to head. Deep stretch.'},
    {id:'core_circuit',name:'Core Circuit (4 exercises × 3 rounds)',sets:3,reps:'circuit',tags:['abs','obliques'],note:'Cable crunch (15) → Hanging leg raise (12) → Russian twist (20) → Plank (45–60s). 45 sec between rounds.'}
  ]},
  4:{name:'Thursday',focus:'Pull + Legs — Back, Posterior Chain',color:'#7a5a10',duration:55,type:'lifting',
    cardio:{name:'Ergo (Rowing Machine)',duration:20,detail:'Steady state. Rate 18–20 spm weeks 1–4, then 22–24 spm.'},
    exercises:[
    {id:'pullups_thu',name:'Pull-Ups / Weighted Pull-Ups',sets:4,reps:'6–8',tags:['lats','biceps'],note:'Match Sunday weight. V-taper comes from lat width.'},
    {id:'cable_row_face',name:'Cable Row + Face Pulls (superset)',sets:3,reps:'10+15',tags:['mid back','rear delt'],note:'Row to belly button, squeeze shoulder blades. Immediately face pulls.'},
    {id:'goblet',name:'Goblet Squat',sets:3,reps:'12–15',tags:['quads','glutes'],note:'Dumbbell at chest. Maintains 3× weekly leg frequency without heavy spinal load.'},
    {id:'db_rdl',name:'Dumbbell Romanian Deadlift',sets:3,reps:'10–12',tags:['hamstrings','glutes'],note:'Same hinge as Tuesday but lighter. Twice-weekly RDLs accelerate hamstring development.'},
    {id:'leg_press_high',name:'Leg Press (high foot placement)',sets:3,reps:'10–12',tags:['glutes','hamstrings'],note:'Feet high shifts load to glutes/hamstrings — different from Tuesday.'}
  ]},
  5:{name:'Friday',focus:'Active Recovery — Cardio Only',color:'#4a6b1a',duration:50,type:'cardio',exercises:[]},
  6:{name:'Saturday',focus:'Full Rest Day',color:'#555048',duration:0,type:'rest',exercises:[]}
};

// Skip-day exercises (can't make gym)
const SKIP_EXERCISES = [
  {id:'sk_run',name:'Running',icon:'🏃',type:'distance',met:8.5,distUnits:['km','miles'],repUnit:null},
  {id:'sk_walk',name:'Walking',icon:'🚶',type:'distance',met:3.5,distUnits:['km','miles','steps'],repUnit:null},
  {id:'sk_bike',name:'Cycling',icon:'🚴',type:'distance',met:7.5,distUnits:['km','miles'],repUnit:null},
  {id:'sk_squat',name:'Squats',icon:'🏋️',type:'reps',met:5.0,distUnits:[],repUnit:'reps'},
  {id:'sk_pushup',name:'Push-Ups',icon:'💪',type:'reps',met:4.0,distUnits:[],repUnit:'reps'},
  {id:'sk_curl',name:'Bicep Curls',icon:'💪',type:'reps',met:3.5,distUnits:[],repUnit:'reps'},
];

// MET values for gym sessions
const MET = {lifting:5.0, rowing:7.0, running:8.5};
const DEFAULT_WT = 85; // kg

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = {
  unit: 'kg', // 'kg' or 'lb'
  sessions: {},
  bodyWeights: [],
  currentFilter: 'all'
};
let charts = {};

function saveState(){try{localStorage.setItem('athlete_v3', JSON.stringify(state));}catch(e){}}
function loadState(){try{const s=localStorage.getItem('athlete_v3');if(s){state=JSON.parse(s);if(!state.unit)state.unit='kg';}}catch(e){}}

function todayKey(){return new Date().toISOString().split('T')[0]}
function dayIdx(){return new Date().getDay()}

// Weight conversions — always store in KG internally
function toKg(val){return state.unit==='lb' ? val/2.20462 : val}
function fromKg(val){return state.unit==='lb' ? +(val*2.20462).toFixed(1) : +val}
function wUnit(){return state.unit==='lb'?'lb':'kg'}
function dispWeight(kg){return fromKg(kg)+' '+wUnit()}

function curWeightKg(){
  if(!state.bodyWeights||!state.bodyWeights.length) return DEFAULT_WT;
  return [...state.bodyWeights].sort((a,b)=>b.date.localeCompare(a.date))[0].weightKg;
}
function metCal(met,kg,mins){return Math.round(met*kg*(mins/60))}

function getSession(){
  const k=todayKey();
  if(!state.sessions[k]) state.sessions[k]={dayIndex:dayIdx(),date:k,sets:{},completedExercises:[],finished:false,caloriesBurnt:0,skipExercises:[]};
  if(!state.sessions[k].skipExercises) state.sessions[k].skipExercises=[];
  return state.sessions[k];
}

function lastWeightKg(exId){
  const today=todayKey();
  const keys=Object.keys(state.sessions).sort().reverse();
  for(const k of keys){
    if(k===today) continue;
    const s=state.sessions[k];
    if(s.sets&&s.sets[exId]){
      const ws=s.sets[exId].filter(x=>x.weightKg>0);
      if(ws.length){const m=Math.max(...ws.map(x=>x.weightKg));if(m>0)return m;}
    }
  }
  return null;
}

// ═══════════════════════════════════════
// UNIT TOGGLE
// ═══════════════════════════════════════
function setUnit(u){
  state.unit=u;
  saveState();
  document.getElementById('unit-kg').classList.toggle('active',u==='kg');
  document.getElementById('unit-lb').classList.toggle('active',u==='lb');
  document.getElementById('wt-hint').textContent='Enter weight in '+u;
  if(document.getElementById('page-today').classList.contains('active')) renderToday();
  if(document.getElementById('page-progress').classList.contains('active')) renderProgress();
}

// ═══════════════════════════════════════
// PAGE NAV
// ═══════════════════════════════════════
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='history') renderHistory();
  if(name==='progress') renderProgress();
  if(name==='plan') renderPlan(dayIdx());
}

// ═══════════════════════════════════════
// PLAN PAGE
// ═══════════════════════════════════════
let planDay = dayIdx();

function renderPlan(di){
  planDay = di;
  const day = PROGRAM[di];
  const today = dayIdx();
  const wkg = curWeightKg();

  // Build day tab strip
  let tabs = '<div class="plan-day-tabs">';
  for(let i=0;i<7;i++){
    const d = PROGRAM[i];
    const isToday = i===today;
    tabs += `<button class="plan-tab ${i===di?'active':''}" onclick="renderPlan(${i})">
      <span class="pt-dot" style="background:${d.color}"></span>${d.name.slice(0,3).toUpperCase()}${isToday?'<span class="today-badge">TODAY</span>':''}
    </button>`;
  }
  tabs += '</div>';

  let body = `<div class="plan-page">`;

  // Hero
  const calEst = day.type==='rest'?0:day.type==='cardio'?metCal(MET.running,wkg,52):metCal(MET.lifting,wkg,day.duration||55)+(day.cardio?metCal(MET.rowing,wkg,day.cardio.duration):0);
  body += `<div class="plan-hero" style="background:linear-gradient(135deg,var(--bg2) 0%,${day.color}22 100%)">
    <div class="plan-day-name" style="color:${day.color}">${day.name}${di===today?'<span class="today-badge">Today</span>':''}</div>
    <div class="plan-focus">${day.focus}</div>
    <div class="plan-chips">
      ${day.duration?`<div class="plan-chip"><strong>${day.duration}</strong> min</div>`:''}
      ${day.type==='lifting'?`<div class="plan-chip"><strong>${day.exercises.length}</strong> exercises</div>`:''}
      ${day.type==='lifting'?`<div class="plan-chip"><strong>${day.exercises.reduce((a,e)=>a+e.sets,0)}</strong> total sets</div>`:''}
      ${day.type!=='rest'&&calEst?`<div class="plan-chip">~<strong>${calEst}</strong> kcal</div>`:''}
    </div>
  </div>`;

  if(day.type==='rest'){
    body += `<div class="plan-rest-card">
      <div class="plan-rest-icon">😴</div>
      <div class="plan-rest-title">Rest Day</div>
      <div class="plan-rest-sub">Muscles grow during recovery, not during training.<br>Sleep 8+ hours. Hit your protein target. No training.</div>
    </div>`;
  } else if(day.type==='cardio'){
    body += `<div class="sh">Active Recovery</div>
    <div class="plan-cardio-card">
      <div class="plan-cardio-name">🏃 Long Run — Option A</div>
      <div class="plan-cardio-detail">45–60 min steady-state at 60–65% max HR. Conversational pace. Builds tennis base fitness and leg endurance.</div>
    </div>
    <div class="plan-cardio-card">
      <div class="plan-cardio-name">🚣 Ergo Session — Option B</div>
      <div class="plan-cardio-detail">Weeks 1–4: all steady state at easy pace. Week 5+: 20 min steady + 4×5 min at rate 22–24 spm with 2 min recovery between each. Drive hard through heels on every stroke.</div>
    </div>
    <div style="padding:14px 16px;font-size:13px;color:var(--text3);font-style:italic">Choose one option. Alternate run and ergo each week.</div>`;
  } else {
    // Lifting day — warmup
    body += `<div class="sh">Warmup</div>
    <div style="margin:0 14px 10px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--text3);border-radius:10px;padding:12px 14px">
      <div style="font-size:13px;color:var(--text2);line-height:1.7">${getWarmup(di)}</div>
    </div>`;

    // Exercises
    body += `<div class="sh">Exercises</div><div class="plan-ex-list">`;
    day.exercises.forEach((ex,idx)=>{
      // Get previous best for each set
      const prevKg = lastWeightKg(ex.id);
      const prevDisp = prevKg ? dispWeight(prevKg) : null;

      // Build set breakdown rows
      let setRows = '';
      for(let s=1;s<=ex.sets;s++){
        setRows += `<div class="plan-set-row">
          <div class="plan-set-num">Set ${s}</div>
          <div class="plan-set-target">${ex.reps} reps</div>
          <div class="plan-set-prev">${prevDisp&&s===1?'Last: '+prevDisp:s===1?'No data yet':''}</div>
        </div>`;
      }

      body += `<div class="plan-ex">
        <div class="plan-ex-main">
          <div class="plan-ex-num">${idx+1}</div>
          <div class="plan-ex-content">
            <div class="plan-ex-name">${ex.name}</div>
            <div class="plan-ex-sets">${ex.sets} sets × ${ex.reps} reps${ex.reps==='circuit'?' per round':''}</div>
            <div class="plan-ex-tags">${ex.tags.map(t=>`<span class="plan-ex-tag">${t}</span>`).join('')}</div>
            <button class="plan-ex-note-btn" onclick="
              var n=document.getElementById('pn${ex.id}');
              var b=document.getElementById('pb${ex.id}');
              n.classList.toggle('open');
              b.classList.toggle('open');
              this.textContent=n.classList.contains('open')?'hide coaching note':'show coaching note'
            ">show coaching note</button>
          </div>
        </div>
        <div class="plan-sets-breakdown" id="pb${ex.id}">
          <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Set breakdown ${prevDisp?'· Previous best: <span style=color:var(--gold)>'+prevDisp+'</span>':''}</div>
          ${setRows}
          <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-top:8px">Rest: ${getRestTime(ex,di)}</div>
        </div>
        <div class="plan-ex-note" id="pn${ex.id}">${ex.note}</div>
      </div>`;
    });
    body += `</div>`;

    // Post-gym cardio
    if(day.cardio){
      body += `<div class="sh">Post-Gym Cardio</div>
      <div class="plan-cardio-card">
        <div class="plan-cardio-name">🚣 ${day.cardio.name} · ${day.cardio.duration} min</div>
        <div class="plan-cardio-detail">${day.cardio.detail}</div>
      </div>`;
    }

    // Total volume summary
    const totalSets = day.exercises.reduce((a,e)=>a+e.sets,0);
    body += `<div style="margin:10px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 16px">

function getWarmup(di){
  const warmups = {
    0:'5 min easy rowing machine · Dead hangs from pull-up bar 2×20 sec · 10× band pull-aparts',
    1:'5 min light jog or bike · 2×10 bodyweight push-ups (slow, full ROM) · 10× arm circles each direction',
    2:'5 min stationary bike · 10× bodyweight squats, 10× glute bridges, 10× leg swings each leg · 1 warmup squat set at ~50% working weight',
    3:'3 min light bike or jump rope · 10× wrist circles each direction · 10× band pull-aparts',
    4:'5 min easy rowing machine · 10× band pull-aparts · 1 dead hang 20 sec',
    5:'Start easy — first 5–10 min very light pace before building to workout intensity',
    6:'Rest day — gentle walk or light stretching only'
  };
  return warmups[di]||'5 min light cardio to elevate heart rate';
}

function getRestTime(ex, di){
  // Compound heavy lifts get longer rest
  const heavy = ['deadlift','squat','bench','ohp','pullups','pullups_thu','bbrow'];
  const isHeavy = heavy.includes(ex.id);
  if(isHeavy) return '2–3 min';
  if(ex.reps==='circuit') return '45 sec between rounds';
  return '60–90 sec';
}

function distToKm(val,unit){
  if(unit==='miles') return val*1.60934;
  if(unit==='steps') return val*0.000762; // avg stride
  return val; // km
}

function calcSkipCal(){
  const ex=selectedSkipEx;
  if(!ex) return 0;
  const wkg=curWeightKg();
  if(ex.type==='distance'){
    const dist=parseFloat(document.getElementById('skip-dist')?.value)||0;
    const unit=document.getElementById('skip-dist-unit')?.value||'km';
    const durEl=document.getElementById('skip-dur');
    let mins=parseFloat(durEl?.value)||0;
    if(!mins&&dist>0){
      // Estimate duration from distance
      const km=distToKm(dist,unit);
      if(ex.id==='sk_run') mins=km*6; // ~6 min/km
      else if(ex.id==='sk_bike') mins=km*3; // ~3 min/km
      else mins=km*12; // walking ~12 min/km or steps
    }
    if(!mins) return 0;
    return metCal(ex.met,wkg,mins);
  } else {
    const mins=parseFloat(document.getElementById('skip-dur')?.value)||0;
    if(!mins) return 0;
    return metCal(ex.met,wkg,mins);
  }
}

function updateSkipCalPreview(){
  const cal=calcSkipCal();
  document.getElementById('skip-cal-preview').textContent=cal>0?cal+' kcal':'—';
}

function buildSkipDetail(){
  const ex=selectedSkipEx;
  if(!ex) return '';
  if(ex.type==='distance'){
    const dist=parseFloat(document.getElementById('skip-dist')?.value)||0;
    const unit=document.getElementById('skip-dist-unit')?.value||'km';
    const dur=parseFloat(document.getElementById('skip-dur')?.value)||0;
    return dist+' '+unit+(dur?' · '+dur+' min':'');
  } else {
    const sets=parseInt(document.getElementById('skip-sets')?.value)||0;
    const reps=parseInt(document.getElementById('skip-reps')?.value)||0;
    const dur=parseInt(document.getElementById('skip-dur')?.value)||0;
    return (sets&&reps?sets+'×'+reps+' reps':'')+' '+(dur?'· '+dur+' min':'');
  }
}

function logSkipEx(){
  const ex=selectedSkipEx;
  if(!ex){alert('Please select an exercise first');return;}
  const kcal=calcSkipCal();
  const detail=buildSkipDetail().trim();
  if(!detail){alert('Please enter some details (distance, reps, or duration)');return;}
  const sess=getSession();
  if(!sess.skipExercises) sess.skipExercises=[];
  sess.skipExercises.push({id:ex.id,name:ex.name,icon:ex.icon,detail,kcal,loggedAt:new Date().toISOString()});
  saveState();
  // Reset
  selectedSkipEx=null;
  document.querySelectorAll('.skip-ex-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('skip-inputs').classList.remove('open');
  document.getElementById('skip-form-area').innerHTML='';
  renderToday();
}

function delSkipEx(idx){
  const sess=getSession();
  sess.skipExercises.splice(idx,1);
  saveState();
  renderToday();
}

function togBody(id){
  const el=document.getElementById('eb'+id);
  const btn=el.previousElementSibling.querySelector('.ex-xbtn');
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'−':'+';
}

function updSet(exId,i,field,val){
  const sess=getSession();
  if(!sess.sets[exId]) sess.sets[exId]=[];
  while(sess.sets[exId].length<=i) sess.sets[exId].push({weightKg:0,reps:'',done:false});
  if(field==='weight'){
    // Store always in kg internally
    const raw=parseFloat(val)||0;
    sess.sets[exId][i].weightKg = state.unit==='lb' ? raw/2.20462 : raw;
  } else {
    sess.sets[exId][i][field]=val;
  }
  saveState();
}

function togSetDone(exId,i,btn){
  const sess=getSession();
  if(!sess.sets[exId]) sess.sets[exId]=[];
  while(sess.sets[exId].length<=i) sess.sets[exId].push({weightKg:0,reps:'',done:false});
  sess.sets[exId][i].done=!sess.sets[exId][i].done;
  btn.classList.toggle('done');
  btn.textContent=sess.sets[exId][i].done?'✓':'○';
  saveState();
}

function addSet(exId){
  const sess=getSession();
  if(!sess.sets[exId]) sess.sets[exId]=[];
  sess.sets[exId].push({weightKg:0,reps:'',done:false});
  saveState();
  renderToday();
}

function togEx(exId){
  const sess=getSession();
  const idx=sess.completedExercises.indexOf(exId);
  if(idx===-1) sess.completedExercises.push(exId);
  else sess.completedExercises.splice(idx,1);
  saveState();
  const card=document.getElementById('ec'+exId);
  const check=card.querySelector('.ex-check');
  card.classList.toggle('done',idx===-1);
  check.classList.toggle('checked',idx===-1);
  const day=PROGRAM[dayIdx()],total=day.exercises.length,done=sess.completedExercises.length;
  const fill=document.querySelector('.prog-fill'),lbl=document.querySelector('.prog-label span:last-child');
  if(fill) fill.style.width=(done/total*100)+'%';
  if(lbl) lbl.textContent=done+'/'+total+' exercises';
}

function finishSession(){
  const sess=getSession(), di=dayIdx(), day=PROGRAM[di];
  const wkg=curWeightKg();
  // Store calories at time of finish (locked to current weight)
  let cal=0;
  if(day.type==='rest') cal=0;
  else if(day.type==='cardio') cal=metCal(MET.running,wkg,52);
  else cal=metCal(MET.lifting,wkg,day.duration||55)+(day.cardio?metCal(MET.rowing,wkg,day.cardio.duration):0);
  // Add skip exercise calories
  const skipCal=(sess.skipExercises||[]).reduce((a,e)=>a+e.kcal,0);
  sess.caloriesBurnt=cal+skipCal;
  sess.finished=true;
  sess.finishedAt=new Date().toISOString();
  saveState();
  const totalSets=Object.values(sess.sets).reduce((a,s)=>a+s.filter(x=>x.done).length,0);
  let maxKg=0;Object.values(sess.sets).forEach(s=>s.forEach(x=>{if(x.weightKg>maxKg)maxKg=x.weightKg;}));
  document.getElementById('sc-sub').textContent=day.name+' — '+day.focus;
  document.getElementById('sc-stats').innerHTML=`
    <div class="sc-stat"><div class="v">${sess.completedExercises.length}</div><div class="l">Exercises</div></div>
    <div class="sc-stat"><div class="v">${totalSets}</div><div class="l">Sets</div></div>
    <div class="sc-stat"><div class="v">${sess.caloriesBurnt}</div><div class="l">Kcal</div></div>
    ${maxKg>0?`<div class="sc-stat"><div class="v">${dispWeight(maxKg)}</div><div class="l">Max</div></div>`:''}`;
  document.getElementById('sess-complete').classList.add('open');
}

function closeSessComplete(){
  document.getElementById('sess-complete').classList.remove('open');
  renderToday();
}

function saveBodyWt(){
  const raw=parseFloat(document.getElementById('wt-in').value);
  if(!raw||raw<30||raw>500){alert('Please enter a valid weight');return;}
  const kg=toKg(raw);
  if(!state.bodyWeights) state.bodyWeights=[];
  const t=todayKey(), ei=state.bodyWeights.findIndex(w=>w.date===t);
  // Store in kg always
  if(ei>=0) state.bodyWeights[ei].weightKg=kg;
  else state.bodyWeights.push({date:t,weightKg:kg});
  saveState();
  document.getElementById('wt-modal').classList.remove('open');
  document.getElementById('wt-in').value='';
  renderToday();
  if(document.getElementById('page-progress').classList.contains('active')) renderProgress();
}

  let h=`<div class="hist-filters">
    <button class="filt-btn ${f==='all'?'active':''}" onclick="setFilter('all')">All</button>
    ${[0,1,2,3,4,5,6].map(i=>`<button class="filt-btn ${f==i?'active':''}" onclick="setFilter(${i})">${PROGRAM[i].name}</button>`).join('')}
  </div><div class="hist-list">`;
  const filtered=sessions.filter(s=>f==='all'||s.dayIndex==f);
  if(!filtered.length) h+='<div class="empty">No sessions yet. Complete your first workout!</div>';
  filtered.forEach(sess=>{
    const day=PROGRAM[sess.dayIndex];
    const ds=new Date(sess.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const total=Object.values(sess.sets||{}).reduce((a,s)=>a+(s||[]).filter(x=>x.done).length,0);
    let maxKg=0;Object.values(sess.sets||{}).forEach(s=>(s||[]).forEach(x=>{if(x.weightKg>maxKg)maxKg=x.weightKg;}));
    let exH='';
    Object.entries(sess.sets||{}).forEach(([id,sets])=>{
      const ex=findEx(id);if(!ex||!sets)return;
      const done=sets.filter(s=>s.done);if(!done.length)return;
      const mkg=Math.max(...done.map(s=>s.weightKg||0));
      exH+=`<div class="he-ex"><span class="he-ex-name">${ex.name}</span><span class="he-ex-val">${done.length} sets${mkg>0?' · '+dispWeight(mkg):''}</span></div>`;
    });
    let skipH='';
    if(sess.skipExercises&&sess.skipExercises.length){
      skipH=`<div class="he-skip-exs"><div class="he-skip-title">Alternative Exercises</div>`;
      sess.skipExercises.forEach(e=>{skipH+=`<div class="he-ex"><span class="he-ex-name">${e.icon} ${e.name}</span><span class="he-ex-val">${e.detail} · ${e.kcal} kcal</span></div>`;});
      skipH+=`</div>`;
    }
    h+=`<div class="hist-entry">
      <div class="he-date">${ds}</div>
      <div class="he-day" style="color:${day.color}">${day.name}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px;font-style:italic">${day.focus}</div>
      <div class="he-stats">
        ${total?`<div class="he-stat">Sets: <span>${total}</span></div>`:''}
        ${maxKg>0?`<div class="he-stat">Max: <span>${dispWeight(maxKg)}</span></div>`:''}
        ${sess.caloriesBurnt?`<div class="he-stat">Kcal: <span>${sess.caloriesBurnt}</span></div>`:''}
        ${sess.finished?'<div class="he-stat" style="color:var(--green)">✓ Done</div>':''}
      </div>
      ${exH?`<div class="he-exs">${exH}</div>`:''}
      ${skipH}
    </div>`;
  });
  h+='</div>';
  document.getElementById('page-history').innerHTML=h;
}

function setFilter(f){state.currentFilter=f;renderHistory();}
function findEx(id){for(const d of Object.values(PROGRAM)){if(d.exercises){const e=d.exercises.find(x=>x.id===id);if(e)return e;}}return null;}

// ═══════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════
function renderProgress(){
  const page=document.getElementById('page-progress');
  const allEx=[];
  Object.values(PROGRAM).forEach(d=>{if(d.exercises)d.exercises.forEach(e=>{if(!allEx.find(x=>x.id===e.id))allEx.push(e);});});
  const bw=(state.bodyWeights||[]).slice(-20).sort((a,b)=>a.date.localeCompare(b.date));
  const latBW=bw.length?dispWeight(bw[bw.length-1].weightKg):'—';
  const pbs=getPBs(allEx);

  page.innerHTML=`<div class="prog-page">
    <div class="chart-card">
      <div class="chart-title">Lift Progress</div>
      <div class="chart-sub">Max weight per session (${wUnit()})</div>
      <select class="chart-sel" id="ex-sel" onchange="updLiftChart()">
        ${allEx.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}
      </select>
      <canvas id="lift-c"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Body Weight</div>
      <div class="chart-sub">Current: <span style="color:var(--gold)">${latBW}</span></div>
      <div class="bw-entry">
        <input class="bw-in" type="number" id="bwp-in" placeholder="${latBW!=='—'?fromKg(bw[bw.length-1].weightKg):'85'}" step="${state.unit==='lb'?'1':'0.1'}" inputmode="decimal">
        <button class="log-bw-btn" onclick="saveBWProgress()">Log (${wUnit()})</button>
      </div>
      <canvas id="bw-c"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Calories Burned</div>
      <div class="chart-sub">Estimated · last 14 sessions</div>
      <canvas id="cal-c"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Alternative Exercise Log</div>
      <div class="chart-sub">Gym-skip days</div>
      <canvas id="skip-c"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Personal Bests</div>
      <div class="chart-sub">Heaviest weight lifted (${wUnit()})</div>
      <div class="pb-list">
        ${pbs.length?pbs.map(p=>`<div class="pb-row"><div><div class="pb-name">${p.name}</div><div class="pb-date">${p.date}</div></div><div class="pb-val">${dispWeight(p.weightKg)}</div></div>`).join(''):'<div class="empty">Complete workouts to see personal bests.</div>'}
      </div>
    </div>
  </div>`;
  setTimeout(()=>{drawLiftChart(allEx[0]?.id);drawBWChart();drawCalChart();drawSkipChart();},50);
}

function saveBWProgress(){
  const raw=parseFloat(document.getElementById('bwp-in').value);
  if(!raw||raw<30||raw>500){alert('Enter a valid weight');return;}
  const kg=toKg(raw);
  if(!state.bodyWeights) state.bodyWeights=[];
  const t=todayKey(), ei=state.bodyWeights.findIndex(w=>w.date===t);
  if(ei>=0) state.bodyWeights[ei].weightKg=kg;
  else state.bodyWeights.push({date:t,weightKg:kg});
  saveState();
  renderProgress();
}

function updLiftChart(){const id=document.getElementById('ex-sel')?.value;if(id)drawLiftChart(id);}

function cOpts(unit,clr){
  return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#555',font:{family:'DM Mono',size:9},maxRotation:45},grid:{color:'#1e1e1e'}},y:{ticks:{color:'#555',font:{family:'DM Mono',size:9},callback:v=>v+unit},grid:{color:'#1e1e1e'}}}};
}

function drawLiftChart(id){
  if(!id) return;
  const c=document.getElementById('lift-c');if(!c)return;
  if(charts.lift){charts.lift.destroy();charts.lift=null;}
  const pts=[];
  Object.values(state.sessions).sort((a,b)=>a.date.localeCompare(b.date)).forEach(s=>{
    if(s.sets&&s.sets[id]){
      const done=s.sets[id].filter(x=>x.done&&x.weightKg>0);
      if(done.length){const mkg=Math.max(...done.map(x=>x.weightKg));
        pts.push({x:new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}),y:fromKg(mkg)});}
    }
  });
  charts.lift=new Chart(c.getContext('2d'),{type:'line',data:{labels:pts.map(p=>p.x),datasets:[{data:pts.map(p=>p.y),borderColor:'#c8390e',backgroundColor:'rgba(200,57,14,0.1)',borderWidth:2,pointBackgroundColor:'#c8390e',pointRadius:4,tension:.3,fill:true}]},options:cOpts(wUnit())});
}

function drawBWChart(){
  const c=document.getElementById('bw-c');if(!c)return;
  if(charts.bw){charts.bw.destroy();charts.bw=null;}
  const d=(state.bodyWeights||[]).slice(-20).sort((a,b)=>a.date.localeCompare(b.date));
  charts.bw=new Chart(c.getContext('2d'),{type:'line',data:{labels:d.map(x=>new Date(x.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})),datasets:[{data:d.map(x=>fromKg(x.weightKg)),borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,0.1)',borderWidth:2,pointBackgroundColor:'#c9a84c',pointRadius:4,tension:.3,fill:true}]},options:cOpts(wUnit())});
}

function drawCalChart(){
  const c=document.getElementById('cal-c');if(!c)return;
  if(charts.cal){charts.cal.destroy();charts.cal=null;}
  const ss=Object.values(state.sessions).sort((a,b)=>a.date.localeCompare(b.date)).slice(-14);
  charts.cal=new Chart(c.getContext('2d'),{type:'bar',data:{labels:ss.map(s=>new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})),datasets:[{data:ss.map(s=>s.caloriesBurnt||0),backgroundColor:'rgba(46,204,113,0.6)',borderColor:'#2ecc71',borderWidth:1,borderRadius:4}]},options:cOpts('kcal')});
}

function drawSkipChart(){
  const c=document.getElementById('skip-c');if(!c)return;
  if(charts.skip){charts.skip.destroy();charts.skip=null;}
  // Aggregate skip exercise calories by type over last 30 days
  const byType={};
  Object.values(state.sessions).forEach(s=>{
    if(s.skipExercises&&s.skipExercises.length){
      s.skipExercises.forEach(e=>{
        if(!byType[e.name]) byType[e.name]=0;
        byType[e.name]+=e.kcal;
      });
    }
  });
  const labels=Object.keys(byType);
  const data=Object.values(byType);
  if(!labels.length){document.getElementById('skip-c').style.display='none';const p=document.getElementById('skip-c').parentNode;p.innerHTML+=`<div class="empty" style="margin-top:0">No alternative exercises logged yet.</div>`;return;}
  const colors=['#3a9fd4','#c9a84c','#2ecc71','#c8390e','#9b59b6','#e67e22'];
  charts.skip=new Chart(c.getContext('2d'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors.slice(0,labels.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#555',font:{family:'DM Mono',size:9},padding:10}}}}});
}

function getPBs(allEx){
  const pbs={};
  Object.values(state.sessions).forEach(s=>{
    if(!s.sets)return;
    Object.entries(s.sets).forEach(([id,sets])=>{
      const done=(sets||[]).filter(x=>x.done&&x.weightKg>0);
      if(!done.length)return;
      const mkg=Math.max(...done.map(x=>x.weightKg));
      if(mkg>0&&(!pbs[id]||mkg>pbs[id].weightKg)) pbs[id]={weightKg:mkg,date:new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})};
    });
  });
  return allEx.filter(e=>pbs[e.id]).map(e=>({name:e.name,weightKg:pbs[e.id].weightKg,date:pbs[e.id].date})).sort((a,b)=>b.weightKg-a.weightKg);
}

// ═══════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════
function openBackupModal(){
  const sc=Object.keys(state.sessions).length,fc=Object.values(state.sessions).filter(s=>s.finished).length;
  const bc=(state.bodyWeights||[]).length;
  const early=sc?Object.keys(state.sessions).sort()[0]:null;
  const es=early?new Date(early).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';
  document.getElementById('bk-summary').innerHTML=`${sc} sessions (${fc} completed)<br>${bc} body weight entries<br>Tracking since: ${es}<br><span style="color:var(--text3);font-size:11px">~${(JSON.stringify(state).length/1024).toFixed(1)} KB</span>`;
  document.getElementById('bk-modal').classList.add('open');
  document.getElementById('imp-status').style.display='none';
}

function exportData(){
  const blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),data:state},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='athlete-backup-'+todayKey()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const b=JSON.parse(e.target.result);
      if(!b.data||!b.data.sessions) throw new Error('Invalid backup file');
      state.sessions=Object.assign({},state.sessions,b.data.sessions);
      const bwm={};
      (state.bodyWeights||[]).forEach(w=>bwm[w.date]=w.weightKg);
      (b.data.bodyWeights||[]).forEach(w=>bwm[w.date]=w.weightKg||toKg(w.weight||0));
      state.bodyWeights=Object.entries(bwm).map(([d,wkg])=>({date:d,weightKg:wkg})).sort((a,c)=>a.date.localeCompare(c.date));
      if(b.data.unit) state.unit=b.data.unit;
      saveState();
      const st=document.getElementById('imp-status');
      st.textContent='✓ Restored '+Object.keys(b.data.sessions).length+' sessions';
      st.style.display='block';st.style.color='var(--green)';
      ev.target.value='';renderToday();setUnit(state.unit);
    }catch(err){
      const st=document.getElementById('imp-status');
      st.textContent='Error: '+err.message;st.style.display='block';st.style.color='#e74c3c';
    }
  };
  r.readAsText(file);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadState();
setUnit(state.unit||'kg');
renderToday();
</script>
